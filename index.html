<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc Mừng 8/3</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Segoe UI;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-image:url("flower.jpg");
color:rgb(185, 253, 248);
}

h1{
font-size:45px;
font-style:italic;
animation: floatText 3s ease-in-out infinite;
}

@keyframes floatText{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

/* chữ 2 màu */
.text{
background: linear-gradient(120deg,#ffb7d8,#9ef0ff,#ffb7d8);
background-size:200% auto;
-webkit-background-clip:text;
background-clip:text;
color:transparent;
animation: shine 4s linear infinite;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:200%}
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:20px;
background:white;
color:#e75480;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.container{
color:white;
background:rgba(0,0,0,0.25);
padding:40px 60px;
border-radius:20px;
backdrop-filter:blur(5px);
text-align:center;
}


</style>
</head>

<body>

<div class="container">
<h1>
<span class="text">𓂃˖˳·˖ ִֶָ ⋆ Chúc Mừng 8/3</span>
<span class="icon">🌷</span>
<span class="text">⋆ ִֶָ˖·˳˖𓂃 ִֶָ</span>
</h1>
</div>

<button onclick="location.href='loichuc.html'">
💌 Mở Lời Chúc
</button>

<button onclick="location.href='hoaroi.html'">
🌸 Xem Hoa Bay
</button>

</body>
</html>
